name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # STAGE 1: Fast Checks (Parallel)
  # ============================================
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test -- --run --reporter=verbose --reporter=json --outputFile=test-results.json
        env:
          CI: true
      
      - name: Generate coverage
        if: always()
        run: npm run test:coverage -- --run
        continue-on-error: true
      
      - name: Create test summary
        if: always()
        run: |
          echo "## 🧪 Unit Tests Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "test-results.json" ]; then
            node -e "
              const results = require('./test-results.json');
              const total = results.numTotalTests || 0;
              const passed = results.numPassedTests || 0;
              const failed = results.numFailedTests || 0;
              const skipped = results.numPendingTests || 0;
              
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| ✅ Passed | ' + passed + ' |');
              console.log('| ❌ Failed | ' + failed + ' |');
              console.log('| ⏭️ Skipped | ' + skipped + ' |');
              console.log('| 📊 Total | ' + total + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "### 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + total.lines.pct + '% |');
              console.log('| Statements | ' + total.statements.pct + '% |');
              console.log('| Functions | ' + total.functions.pct + '% |');
              console.log('| Branches | ' + total.branches.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results.json
          retention-days: 7

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run type check
        run: npm run typecheck 2>&1 | tee typecheck-output.txt
      
      - name: Create type check summary
        if: always()
        run: |
          echo "## 🔍 TypeScript Type Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "typecheck-output.txt" ]; then
            errors=$(grep -c "error TS" typecheck-output.txt || echo "0")
            
            if [ "$errors" -eq "0" ]; then
              echo "✅ **No type errors found!**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Found $errors type errors**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>View errors</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              head -20 typecheck-output.txt >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint 2>&1 | tee lint-output.txt
        continue-on-error: true
      
      - name: Check formatting
        run: npm run format:check 2>&1 | tee format-output.txt
        continue-on-error: true
      
      - name: Create lint summary
        if: always()
        run: |
          echo "## 🎨 Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if grep -q "error" lint-output.txt; then
            echo "| ESLint | ❌ Errors found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ESLint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if grep -q "warn" lint-output.txt; then
            warnings=$(grep -c "warn" lint-output.txt || echo "0")
            echo "| Warnings | ⚠️ $warnings warnings |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if grep -q "Code style issues" format-output.txt; then
            echo "| Prettier | ❌ Formatting issues |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Prettier | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # STAGE 2: Smoke Tests (Only if Stage 1 passes)
  # ============================================
  
  smoke-tests:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests, typecheck, lint]  # 🔥 DEPENDENCY!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list @playwright/test --depth=0 --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      
      - name: Cache build output
        uses: actions/cache@v4
        id: build-cache
        with:
          path: dist
          key: build-${{ runner.os }}-${{ hashFiles('src/**', 'index.html', 'vite.config.ts') }}
      
      - name: Build application
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm run build
        env:
          VITE_DISABLE_AI: 'true'
      
      - name: Run smoke tests
        run: npm run test:e2e tests/smoke.spec.ts -- --project=chromium --reporter=html --reporter=json --reporter=list
        env:
          CI: true
      
      - name: Create smoke tests summary
        if: always()
        run: |
          echo "## 🔥 Smoke Tests Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "test-results/.last-run.json" ] || [ -f "test-results/results.json" ]; then
            echo "### Test Execution" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Playwright stores results differently, extract what we can
            passed=$(find test-results -name "*.webm" | wc -l || echo "0")
            
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Browser | Chromium |" >> $GITHUB_STEP_SUMMARY
            echo "| Tests Run | 20 |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | Check artifacts |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ -d "playwright-report" ]; then
              echo "📊 **[View Full HTML Report in Artifacts]**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Available Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- HTML Report (interactive)" >> $GITHUB_STEP_SUMMARY
          echo "- Test Videos (on failure)" >> $GITHUB_STEP_SUMMARY
          echo "- Screenshots (on failure)" >> $GITHUB_STEP_SUMMARY
          echo "- Trace files (for debugging)" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7
      
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-videos
          path: test-results/**/*.webm
          retention-days: 7
      
      - name: Comment PR with test report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            
            let message = '## 🔥 Smoke Tests Report\n\n';
            
            message += '| Stage | Status |\n';
            message += '|-------|--------|\n';
            message += `| Unit Tests | ${'${{ needs.unit-tests.result }}' === 'success' ? '✅' : '❌'} |\n`;
            message += `| Type Check | ${'${{ needs.typecheck.result }}' === 'success' ? '✅' : '❌'} |\n`;
            message += `| Lint | ${'${{ needs.lint.result }}' === 'success' ? '✅' : '❌'} |\n`;
            message += `| Smoke Tests | ${'${{ job.status }}' === 'success' ? '✅' : '❌'} |\n`;
            message += '\n';
            
            message += '### 📊 Artifacts\n';
            message += '- [HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            message += '- Coverage reports\n';
            message += '- Test videos (if failed)\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # ============================================
  # STAGE 3: Summary
  # ============================================
  
  status-check:
    name: All Checks Passed ✅
    runs-on: ubuntu-latest
    needs: [smoke-tests]  # Wymaga wszystkiego
    if: always()
    
    steps:
      - name: Create final summary
        run: |
          echo "# 🎉 CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks have completed. Review the results above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Check status
        run: |
          if [ "${{ needs.smoke-tests.result }}" == "success" ]; then
            echo "✅ All CI checks passed!"
            echo "Ready to merge 🚀"
            exit 0
          else
            echo "❌ CI pipeline failed"
            echo "Check the logs above"
            exit 1
          fi
